<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FarmConnect - Sign Up</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        gold: { 400: '#c9a962', 500: '#a38d6d', 600: '#8a7557' },
                        dark: { 900: '#0a0a0a', 800: '#141414', 700: '#1a1a1a', 600: '#252525', 500: '#333' },
                        agri: { 500: '#10b981', 600: '#059669' }, /* Green for Light Mode */
                        danger: '#e85d75'
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="signup.css">
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4 transition-colors duration-300 bg-gray-50 text-gray-900 dark:bg-dark-900 dark:text-gray-200 radial-bg">

    <div class="absolute top-4 right-4 z-50">
        <button onclick="toggleTheme()" class="p-2 rounded-lg transition-colors glass-panel text-gray-600 hover:text-agri-600 dark:text-gray-400 dark:hover:text-gold-400" title="Toggle Theme">
            <i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i>
            <i data-lucide="sun" class="w-5 h-5 block dark:hidden"></i>
        </button>
    </div>

    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-20 -right-20 w-96 h-96 rounded-full blur-3xl opacity-50 bg-agri-500/20 dark:bg-gold-500/10"></div>
        <div class="absolute -bottom-20 -left-20 w-96 h-96 rounded-full blur-3xl opacity-50 bg-agri-500/10 dark:bg-gold-500/5"></div>
    </div>

    <div class="w-full max-w-lg animate-up relative z-10 my-8">
        
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold tracking-tight flex items-center justify-center gap-3 text-gray-900 dark:text-white">
                <div class="inline-flex items-center justify-center w-10 h-10 rounded-xl shadow-lg
                    bg-gradient-to-br from-agri-500 to-agri-600 text-white shadow-agri-500/20
                    dark:from-gold-400 dark:to-gold-600 dark:text-dark-900 dark:shadow-gold-500/20">
                    <i data-lucide="wheat" class="w-5 h-5"></i>
                </div>
                FARMCONNECT
            </h1>
            <p class="text-sm mt-2 text-gray-500 dark:text-gray-400">Create your trading account</p>
        </div>

        <div class="glass-panel rounded-2xl p-8">
            <form id="signupForm" class="space-y-5">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-1.5">
                        <label class="text-xs font-medium ml-1 text-gray-500 dark:text-gray-400">First Name</label>
                        <input type="text" id="firstName" placeholder="John" required class="input-field w-full rounded-xl py-3 px-4 text-sm">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-medium ml-1 text-gray-500 dark:text-gray-400">Last Name</label>
                        <input type="text" id="lastName" placeholder="Doe" required class="input-field w-full rounded-xl py-3 px-4 text-sm">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div class="space-y-1.5">
                        <label class="text-xs font-medium ml-1 text-gray-500 dark:text-gray-400">Date of Birth</label>
                        <input type="date" required class="input-field date-field w-full rounded-xl py-3 px-4 text-sm">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-xs font-medium ml-1 text-gray-500 dark:text-gray-400">Phone Number</label>
                        <div class="relative group">
                            <i data-lucide="phone" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 transition-colors text-gray-400 group-focus-within:text-agri-500 dark:text-gray-500 dark:group-focus-within:text-gold-400"></i>
                            <input type="tel" placeholder="080..." required class="input-field w-full rounded-xl py-3 pl-10 pr-4 text-sm">
                        </div>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-medium ml-1 text-gray-500 dark:text-gray-400">Residential Address</label>
                    <div class="relative group">
                        <i data-lucide="map-pin" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 transition-colors text-gray-400 group-focus-within:text-agri-500 dark:text-gray-500 dark:group-focus-within:text-gold-400"></i>
                        <input type="text" placeholder="Street, City, State" required class="input-field w-full rounded-xl py-3 pl-10 pr-4 text-sm">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-medium ml-1 text-gray-500 dark:text-gray-400">NIN (Verification)</label>
                    <div class="relative group">
                        <i data-lucide="shield-check" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 transition-colors text-gray-400 group-focus-within:text-agri-500 dark:text-gray-500 dark:group-focus-within:text-gold-400"></i>
                        <input type="text" placeholder="11-digit NIN" required class="input-field w-full rounded-xl py-3 pl-10 pr-4 text-sm">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-medium ml-1 text-gray-500 dark:text-gray-400">Account Role</label>
                    <div class="relative group">
                        <i data-lucide="briefcase" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 z-10 transition-colors text-gray-400 group-focus-within:text-agri-500 dark:text-gray-500 dark:group-focus-within:text-gold-400"></i>
                        <select id="userRole" required class="input-field w-full rounded-xl py-3 pl-10 pr-4 text-sm appearance-none cursor-pointer">
                            <option value="buyer" selected>Buyer (Retail/Wholesale)</option>
                            <option value="farmer">Farmer (Seller)</option>
                            <option value="transporter">Transporter (Logistics)</option>
                        </select>
                        <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400 dark:text-gray-500 pointer-events-none"></i>
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-medium ml-1 text-gray-500 dark:text-gray-400">Username</label>
                    <div class="relative group">
                        <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 transition-colors text-gray-400 group-focus-within:text-agri-500 dark:text-gray-500 dark:group-focus-within:text-gold-400"></i>
                        <input type="text" id="usernameInput" placeholder="Create a username" required class="input-field w-full rounded-xl py-3 pl-10 pr-4 text-sm">
                    </div>
                </div>

                <div class="space-y-1.5">
                    <label class="text-xs font-medium ml-1 text-gray-500 dark:text-gray-400">Password</label>
                    <div class="relative group">
                        <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 transition-colors text-gray-400 group-focus-within:text-agri-500 dark:text-gray-500 dark:group-focus-within:text-gold-400"></i>
                        <input type="password" placeholder="Create a password" required class="input-field w-full rounded-xl py-3 pl-10 pr-4 text-sm">
                    </div>
                </div>

                <button type="submit" class="w-full font-bold py-3.5 rounded-xl transform hover:-translate-y-0.5 transition-all shadow-lg mt-6
                    bg-gradient-to-r from-agri-500 to-agri-600 text-white shadow-agri-500/20 hover:from-agri-400 hover:to-agri-500
                    dark:from-gold-500 dark:to-gold-600 dark:text-dark-900 dark:shadow-gold-500/20 dark:hover:from-gold-400 dark:hover:to-gold-500">
                    Create Account
                </button>
            </form>

            <div class="mt-6 pt-6 border-t text-center border-gray-200 dark:border-white/5">
                <p class="text-sm text-gray-500 dark:text-gray-400">
                    Already have an account? 
                    <a href="login.html" class="font-medium transition-colors text-agri-600 hover:text-agri-700 dark:text-gold-400 dark:hover:text-gold-300">Log In</a>
                </p>
            </div>
        </div>

        <a href="index.html" class="flex items-center justify-center gap-2 mt-8 transition-colors text-sm text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white">
            <i data-lucide="arrow-left" class="w-4 h-4"></i>
            Back to Market
        </a>
    </div>

    <script src="api.js"></script>
    <script src="signup.js"></script>
</body>
</html>
